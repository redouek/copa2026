name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}
          channelId: live
          projectId: album-copa-26

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}

      - name: Deploy Firestore rules via REST API
        run: |
          TOKEN=$(gcloud auth print-access-token)
          CONTENT=$(python3 -c "import json; print(json.dumps(open('firestore.rules').read()))")

          # Cria novo ruleset
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"name\":\"firestore.rules\",\"content\":$CONTENT}]}}" \
            "https://firebaserules.googleapis.com/v1/projects/album-copa-26/rulesets" \
            > /tmp/ruleset.json
          cat /tmp/ruleset.json

          # Extrai o nome e monta o body via Python (evita problemas de quoting)
          python3 << 'PYEOF'
          import json
          with open('/tmp/ruleset.json') as f:
              ruleset = json.load(f)
          name = ruleset['name']
          print(f"Ruleset: {name}")
          with open('/tmp/patch_body.json', 'w') as f:
              json.dump({'rulesetName': name}, f)
          PYEOF

          echo "Body que será enviado:"
          cat /tmp/patch_body.json

          # Vincula ao release cloud.firestore
          RESP=$(curl -s -o /tmp/patch_resp.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/patch_body.json \
            "https://firebaserules.googleapis.com/v1/projects/album-copa-26/releases/cloud.firestore")

          echo "PATCH HTTP $RESP:"
          cat /tmp/patch_resp.json

          [ "$RESP" -ge 200 ] && [ "$RESP" -lt 300 ] && echo "Rules implantadas!" || exit 1
