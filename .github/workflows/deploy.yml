name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}
          channelId: live
          projectId: album-copa-26

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}

      - name: Deploy Firestore rules via Python SDK
        run: |
          pip install google-api-python-client google-auth -q
          python3 << 'PYEOF'
          import os
          from googleapiclient.discovery import build
          from google.oauth2 import service_account

          creds = service_account.Credentials.from_service_account_file(
              os.environ['GOOGLE_APPLICATION_CREDENTIALS'],
              scopes=[
                  'https://www.googleapis.com/auth/firebase',
                  'https://www.googleapis.com/auth/cloud-platform'
              ]
          )
          svc = build('firebaserules', 'v1', credentials=creds, cache_discovery=False)

          with open('firestore.rules') as f:
              content = f.read()

          ruleset = svc.projects().rulesets().create(
              name='projects/album-copa-26',
              body={'source': {'files': [{'name': 'firestore.rules', 'content': content}]}}
          ).execute()
          print(f"Ruleset criado: {ruleset['name']}")

          try:
              release = svc.projects().releases().patch(
                  name='projects/album-copa-26/releases/cloud.firestore',
                  body={'rulesetName': ruleset['name']}
              ).execute()
              print(f"Release atualizado: {release['name']}")
          except Exception as e:
              print(f"PATCH falhou ({e}), criando release...")
              release = svc.projects().releases().create(
                  name='projects/album-copa-26',
                  body={
                      'name': 'projects/album-copa-26/releases/cloud.firestore',
                      'rulesetName': ruleset['name']
                  }
              ).execute()
              print(f"Release criado: {release['name']}")

          print("Firestore rules implantadas com sucesso!")
          PYEOF
