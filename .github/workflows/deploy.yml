name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}
          channelId: live
          projectId: album-copa-26

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}

      - name: Deploy Firestore rules via REST API
        run: |
          pip install google-auth requests -q
          python3 << 'PYEOF'
          import os, json, requests, sys
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request as AuthRequest

          creds = service_account.Credentials.from_service_account_file(
              os.environ['GOOGLE_APPLICATION_CREDENTIALS'],
              scopes=[
                  'https://www.googleapis.com/auth/firebase',
                  'https://www.googleapis.com/auth/cloud-platform'
              ]
          )
          creds.refresh(AuthRequest())
          token = creds.token

          with open('firestore.rules') as f:
              content = f.read()

          project = 'album-copa-26'
          base = f'https://firebaserules.googleapis.com/v1/projects/{project}'
          hdrs = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

          # Cria ruleset
          r = requests.post(f'{base}/rulesets', headers=hdrs,
              data=json.dumps({'source': {'files': [{'name': 'firestore.rules', 'content': content}]}}))
          r.raise_for_status()
          ruleset_name = r.json()['name']
          print(f'Ruleset: {ruleset_name}')

          release_res = f'projects/{project}/releases/cloud.firestore'
          url = f'{base}/releases/cloud.firestore'

          # Testa múltiplos formatos, para no primeiro que funcionar
          formats = [
              ('F1: UpdateReleaseRequest com release.name', None,
               {'release': {'name': release_res, 'rulesetName': ruleset_name}, 'updateMask': 'rulesetName'}),
              ('F2: UpdateReleaseRequest sem release.name', None,
               {'release': {'rulesetName': ruleset_name}, 'updateMask': 'rulesetName'}),
              ('F3: Release direto sem updateMask', None,
               {'name': release_res, 'rulesetName': ruleset_name}),
              ('F4: Release direto com updateMask query', {'updateMask': 'rulesetName'},
               {'name': release_res, 'rulesetName': ruleset_name}),
          ]

          for desc, params, body in formats:
              r = requests.patch(url, headers=hdrs, params=params, data=json.dumps(body))
              print(f'{desc}: {r.status_code}: {r.text[:400]}')
              if r.status_code == 200:
                  print('Firestore rules implantadas com sucesso!')
                  sys.exit(0)

          print('Nenhum formato funcionou')
          sys.exit(1)
          PYEOF
