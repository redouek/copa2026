name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Escrever credenciais
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}' > /tmp/sa.json

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}
          channelId: live
          projectId: album-copa-26

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore + Storage rules
        run: firebase deploy --only firestore:rules,storage --project album-copa-26
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Configurar CORS do Storage
        run: |
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          gsutil cors set cors.json gs://album-copa-26.firebasestorage.app
