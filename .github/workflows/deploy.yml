name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}
          channelId: live
          projectId: album-copa-26

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}

      - name: Deploy Firestore rules via REST API
        run: |
          TOKEN=$(gcloud auth print-access-token)
          CONTENT=$(python3 -c "import json; print(json.dumps(open('firestore.rules').read()))")

          # Cria novo ruleset com o conteúdo de firestore.rules
          RULESET=$(curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"name\":\"firestore.rules\",\"content\":$CONTENT}]}}" \
            "https://firebaserules.googleapis.com/v1/projects/album-copa-26/rulesets")
          NAME=$(echo "$RULESET" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")
          echo "Ruleset criado: $NAME"

          RELEASE_BODY="{\"name\":\"projects/album-copa-26/releases/cloud.firestore\",\"rulesetName\":\"$NAME\"}"

          # Tenta atualizar release existente
          HTTP=$(curl -s -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$RELEASE_BODY" \
            "https://firebaserules.googleapis.com/v1/projects/album-copa-26/releases/cloud.firestore")

          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "Release atualizado (HTTP $HTTP)"
          else
            echo "PATCH falhou (HTTP $HTTP) — tentando criar release..."
            cat /tmp/patch.json
            curl -sf -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$RELEASE_BODY" \
              "https://firebaserules.googleapis.com/v1/projects/album-copa-26/releases"
            echo "Release criado"
          fi
