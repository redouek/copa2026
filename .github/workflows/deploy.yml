name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}
          channelId: live
          projectId: album-copa-26

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore + Storage Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALBUM_COPA_26 }}' > /tmp/sa.json
          firebase deploy --only firestore:rules,storage --project album-copa-26
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
