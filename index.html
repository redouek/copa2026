<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa 2026 — Álbum de Figurinhas</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #2a2e2a; color: #222; font-size: 14px; }

/* ── Header ── */
header {
  background: linear-gradient(135deg, #005f1f, #1a8f3a);
  color: white; padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  -webkit-print-color-adjust: exact; print-color-adjust: exact;
}
header h1 { font-size: 18px; font-weight: 700; }
#globalStats { margin-left: auto; text-align: right; font-size: 13px; line-height: 1.5; }

/* ── Toolbar ── */
.toolbar {
  background: white; padding: 8px 14px; border-bottom: 1px solid #ddd;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.btn {
  padding: 6px 14px; border: none; border-radius: 5px;
  cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.82; }
.btn-green  { background: #005f1f; color: white; }
.btn-blue   { background: #1255a0; color: white; }
.btn-orange { background: #c05000; color: white; }
.btn-red    { background: #a01010; color: white; }
.btn-gray   { background: #555; color: white; }
.toolbar-hint { font-size: 11px; color: #888; margin-left: 6px; }

/* ── Main layout ── */
main { padding: 10px 12px; }
.groups-grid { display: flex; flex-direction: column; gap: 10px; }

/* ── Group block ── */
.group-block {
  background: white; border-radius: 7px;
  box-shadow: 0 1px 4px rgba(0,0,0,.12); overflow: hidden;
}
.group-header {
  padding: 6px 12px; font-weight: 700; font-size: 14px; color: white;
  display: flex; align-items: center; gap: 8px;
  -webkit-print-color-adjust: exact; print-color-adjust: exact;
}
.group-header .g-letter { font-size: 20px; font-weight: 900; opacity: .75; }
.group-header .g-stats  { margin-left: auto; font-size: 11px; font-weight: 400; }

/* ── Teams row ── */
.teams-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid #eee;
}
.team-block { border-right: 1px solid #eee; padding: 8px; }
.team-block:last-child { border-right: none; }
.team-title {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 4px;
}
.team-name { font-weight: 700; font-size: 12px; }
.team-code {
  font-family: monospace; font-size: 10px; background: #f0f0f0;
  padding: 1px 4px; border-radius: 3px; color: #555;
}
.team-meta { font-size: 10px; color: #999; margin-bottom: 5px; min-height: 14px; }

/* ── Sticker grid ── */
.stickers-wrap { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }

.chip {
  text-align: center; padding: 3px 1px; font-size: 9px; line-height: 1.2;
  border-radius: 3px; border: 1px solid #ddd;
  cursor: pointer; user-select: none; transition: background .1s;
  white-space: nowrap; overflow: hidden;
}
.chip.missing {
  background: #fff0f0; border-color: #f08080; color: #c00;
  font-weight: 700;
}
.chip.have {
  background: #f0fff0; border-color: #90c090; color: #2a6e2a;
  text-decoration: line-through; opacity: .6;
}

/* ── FWC special ── */
.fwc-section { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #eee; }
.fwc-sub { padding: 8px; border-right: 1px solid #eee; }
.fwc-sub:last-child { border-right: none; }
.fwc-sub-title { font-size: 11px; color: #777; margin-bottom: 5px; font-weight: 600; }

/* ── Group colors ── */
.gc-A { background: #b71c1c; }
.gc-B { background: #880e4f; }
.gc-C { background: #bf360c; }
.gc-D { background: #4527a0; }
.gc-E { background: #1a237e; }
.gc-F { background: #1b5e20; }
.gc-G { background: #33691e; }
.gc-H { background: #006064; }
.gc-I { background: #0d47a1; }
.gc-J { background: #4a148c; }
.gc-K { background: #3e2723; }
.gc-L { background: #263238; }
.gc-FWC { background: #005f1f; }

/* ── Filter buttons ── */
.filter-bar { display: flex; gap: 6px; align-items: center; font-size: 12px; padding: 0 2px; }
.btn-filter {
  padding: 3px 10px; border-radius: 12px; border: 2px solid transparent;
  cursor: pointer; font-size: 12px; font-weight: 600; opacity: .45;
  transition: opacity .15s, border-color .15s;
}
.btn-filter.active { opacity: 1; border-color: rgba(255,255,255,.6); }
.btn-filter-missing { background: #f08080; color: #fff; }
.btn-filter-have    { background: #6abf6a; color: #fff; }

/* ══════════════════════════════════════════
   PRINT STYLES
══════════════════════════════════════════ */
/* ── Auth toolbar ── */
.auth-area { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.user-chip {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #555;
}
.user-chip img { width: 22px; height: 22px; border-radius: 50%; }
.btn-auth    { background: #4285f4; color: white; }
.btn-admin   { background: #7c4dff; color: white; font-size: 12px; }
.btn-signout { background: #eee; color: #333; font-size: 12px; padding: 4px 10px; }

.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th { text-align: left; font-size: 11px; color: #888; padding: 4px 8px; border-bottom: 1px solid #eee; }
.admin-table td { padding: 8px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.admin-table tr:last-child td { border-bottom: none; }
.admin-avatar { width: 28px; height: 28px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }
.admin-nophoto { display:inline-block; width:28px; height:28px; border-radius:50%; background:#ddd; text-align:center; line-height:28px; font-size:14px; margin-right:6px; vertical-align:middle; }
.sync-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7;
}
.sync-badge.syncing { background: #fff8e1; color: #f57f17; border-color: #ffe082; }
.sync-badge.offline { background: #fce4ec; color: #b71c1c; border-color: #ef9a9a; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: white; border-radius: 10px; padding: 28px 28px 22px;
  width: 340px; max-width: 92vw; box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.modal-box h2 { font-size: 18px; margin-bottom: 18px; color: #222; }
.modal-divider {
  display: flex; align-items: center; gap: 10px;
  color: #aaa; font-size: 12px; margin: 14px 0;
}
.modal-divider::before, .modal-divider::after {
  content: ''; flex: 1; height: 1px; background: #ddd;
}
.modal-input {
  width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
  font-size: 14px; margin-bottom: 8px; outline: none;
}
.modal-input:focus { border-color: #4285f4; }
.modal-error { color: #c62828; font-size: 12px; min-height: 18px; margin-bottom: 6px; }
.modal-row { display: flex; gap: 8px; margin-top: 4px; }
.modal-row .btn { flex: 1; justify-content: center; }
.btn-google {
  width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 6px;
  background: white; cursor: pointer; font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background .15s;
}
.btn-google:hover { background: #f5f5f5; }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.modal-tabs { display: flex; margin-bottom: 16px; border-bottom: 2px solid #eee; }
.modal-tab {
  flex: 1; padding: 7px; text-align: center; cursor: pointer;
  font-size: 13px; font-weight: 600; color: #888; border: none; background: none;
}
.modal-tab.active { color: #4285f4; border-bottom: 2px solid #4285f4; margin-bottom: -2px; }

/* ── Nav bar ── */
.nav-bar {
  background: #fff; padding: 7px 14px; border-bottom: 1px solid #e0e0e0;
  display: flex; align-items: center; gap: 10px;
}
.nav-label { font-size: 13px; color: #555; font-weight: 600; white-space: nowrap; }
.nav-select {
  padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px;
  font-size: 13px; cursor: pointer; min-width: 240px; max-width: 320px;
  background: white; color: #222;
}
.nav-select:focus { outline: none; border-color: #4285f4; box-shadow: 0 0 0 2px rgba(66,133,244,.2); }

/* ── Flash animation ── */
@keyframes flash-team {
  0%         { box-shadow: none;                                                    background: white; }
  15%, 50%, 85% { box-shadow: 0 0 0 4px #ffd700, 0 0 22px rgba(255,200,0,.55); background: #fffde7; }
  32%, 68%   { box-shadow: none;                                                    background: white; }
  100%       { box-shadow: none;                                                    background: white; }
}
.team-block.flash { animation: flash-team 2s ease-in-out; }

#printHeader { display: none; }

@media print {
  .nav-bar { display: none; }
  body { background: white; font-size: 12px; }
  header { display: none; }
  .toolbar, .filter-bar { display: none !important; }
  #printHeader {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 8px; margin-bottom: 6px;
    border-bottom: 2px solid #333; font-size: 12px;
  }
  #printHeader strong { font-size: 13px; }
  main { padding: 3px; }
  .groups-grid { gap: 5px; }

  .group-block { box-shadow: none; border: 1px solid #bbb; page-break-inside: avoid; }
  .group-header { padding: 4px 8px; font-size: 12px; }
  .group-header .g-letter { font-size: 15px; }

  /* hide stickers already found */
  .chip.have { display: none; }

  /* hide teams where nothing is missing */
  .team-block.print-hide { display: none; }

  /* hide entire group block if all complete */
  .group-block.print-hide { display: none; }

  .teams-row { grid-template-columns: repeat(4, 1fr); }
  .team-block { padding: 5px; }
  .stickers-wrap { grid-template-columns: repeat(5, 1fr); gap: 3px; }
  .chip { font-size: 11px; padding: 4px 2px; font-weight: 600; }

  .fwc-section { grid-template-columns: 1fr 1fr; }
  .fwc-sub { padding: 5px; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>⚽ Copa do Mundo 2026 — Álbum de Figurinhas</h1>
    <div class="filter-bar">
      <button class="btn-filter btn-filter-missing active" id="btnMissing" onclick="toggleFilter('missing')">🔴 Faltando</button>
      <button class="btn-filter btn-filter-have active"    id="btnHave"    onclick="toggleFilter('have')">🟢 Tenho</button>
      <span style="color:rgba(255,255,255,.5);font-size:11px">· clique para filtrar</span>
    </div>
  </div>
  <div id="globalStats">—</div>
</header>

<div id="loginModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h2>Sincronizar entre dispositivos</h2>
    <button class="btn-google" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Entrar com Google
    </button>
    <div class="modal-divider">ou</div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabEntrar" onclick="switchTab('entrar')">Entrar</button>
      <button class="modal-tab" id="tabCriar" onclick="switchTab('criar')">Criar conta</button>
    </div>
    <input class="modal-input" id="authEmail" type="email" placeholder="E-mail">
    <input class="modal-input" id="authPass"  type="password" placeholder="Senha">
    <div class="modal-error" id="authError"></div>
    <div class="modal-row">
      <button class="btn btn-blue" id="btnEmailAction" onclick="emailAction()">Entrar</button>
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-green"  onclick="printMissing()">🖨️ Imprimir Faltantes</button>
  <button class="btn btn-blue"   onclick="importList()">📋 Importar Lista</button>
  <button class="btn btn-orange" onclick="exportList()">📤 Exportar Lista</button>
  <button class="btn btn-red"    onclick="resetAllMissing()">↩ Zerar Álbum</button>
  <div class="auth-area">
    <span class="sync-badge offline" id="syncBadge">sem sync</span>
    <div id="userChip" class="user-chip" style="display:none"></div>
    <button class="btn btn-auth" id="btnLogin" onclick="showLoginModal()">🔑 Sincronizar</button>
    <button class="btn btn-admin" id="btnAdmin" style="display:none" onclick="showAdminPanel()">👥 Usuários</button>
    <button class="btn btn-signout" id="btnLogout" style="display:none" onclick="doSignOut()">Sair</button>
  </div>
  <span class="toolbar-hint">Estado salvo automaticamente no navegador</span>
</div>

<div id="adminModal" class="modal-overlay" onclick="if(event.target===this)closeAdminModal()">
  <div class="modal-box" style="width:520px;max-height:80vh;display:flex;flex-direction:column">
    <h2 style="margin-bottom:12px">👥 Usuários cadastrados</h2>
    <div id="adminList" style="overflow-y:auto;flex:1;font-size:13px"></div>
    <div style="margin-top:14px;text-align:right">
      <button class="btn btn-gray" onclick="closeAdminModal()">Fechar</button>
    </div>
  </div>
</div>

<div class="nav-bar">
  <span class="nav-label">⚡ Ir para:</span>
  <select class="nav-select" id="teamJump" onchange="jumpToTeam(this.value)">
    <option value="">— Selecione um time —</option>
  </select>
</div>

<div id="printHeader">
  <strong>Copa FIFA 2026 — Controle de Figurinhas</strong>
  <span id="printStats"></span>
</div>

<main>
  <div class="groups-grid" id="groupsContainer"></div>
</main>

  return `<img src="https://flagcdn.com/w40/${iso2}.png" height="${h}" style="vertical-align:middle;border:1px solid rgba(0,0,0,.1);border-radius:2px" alt="" loading="lazy">`;

// Number → { label }
// 1–9  : FWC00–FWC08 (início)
// 10–969: team stickers
// 970–980: FWC09–FWC19 (final)
function numToLabel(n) {
  if (n >= 1 && n <= 9) {
    return 'FWC' + String(n - 1).padStart(2, '0');
  }
  if (n >= 10 && n <= 969) {
    const ti  = Math.floor((n - 10) / 20);
    const pos = (n - 10) % 20 + 1;
    return TEAMS[ti].code + pos;
  }
  if (n >= 970 && n <= 980) {
    return 'FWC' + String(n - 970 + 9).padStart(2, '0');
  }
  return '?';
}

// ═══════════════════════════════════════════════
// STATE  (true = missing, false = have)
// ═══════════════════════════════════════════════
let state = {};

function initState() {
  for (let n = 1; n <= 980; n++) state[n] = INITIAL_MISSING_NUMS.has(n);
}

function storageGet(key) {
  try { return localStorage.getItem(key); } catch { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, val); } catch { /* sem suporte a localStorage */ }
}

function loadState() {
  const raw = storageGet('copa2026_v2');
  if (raw) {
    try {
      const obj = JSON.parse(raw);
      for (let n = 1; n <= 980; n++) state[n] = !!obj[n];
      return;
    } catch { /* fallback abaixo */ }
  }
  initState();
}

function persist() {
  storageSet('copa2026_v2', JSON.stringify(state));
}

// ═══════════════════════════════════════════════
// UI BUILD
// ═══════════════════════════════════════════════

function makeChip(n, label) {
  const el = document.createElement('div');
  el.id = 'c' + n;
  el.dataset.n = n;
  el.className = 'chip ' + (state[n] ? 'missing' : 'have');
  el.textContent = label;
  el.title = '#' + n + ' → ' + label;
  el.onclick = () => toggle(n);
  return el;
}

function buildUI() {
  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';

  // ── FWC Special ──
  const fwcBlock = document.createElement('div');
  fwcBlock.className = 'group-block';
  fwcBlock.id = 'gb_FWC';
  fwcBlock.innerHTML = `
    <div class="group-header gc-FWC">

    </div>
    <div class="fwc-section">
      <div class="fwc-sub">
        <div class="fwc-sub-title">Início do Álbum (FWC00–FWC08)</div>
        <div class="stickers-wrap" id="fw_start"></div>
      </div>
      <div class="fwc-sub">
        <div class="fwc-sub-title">Final do Álbum (FWC09–FWC19)</div>

  container.appendChild(fwcBlock);

    block.appendChild(row);
    container.appendChild(block);
  }

  updateStats();
}

// ═══════════════════════════════════════════════
// TOGGLE + STATS
// ═══════════════════════════════════════════════

function toggle(n) {
  state[n] = !state[n];
  const el = document.getElementById('c' + n);
  if (el) {
    el.className = 'chip ' + (state[n] ? 'missing' : 'have');
    if (state[n] && !showMissing) el.style.display = 'none';
    if (!state[n] && !showHave)   el.style.display = 'none';
    if (state[n] && showMissing)  el.style.display = '';
    if (!state[n] && showHave)    el.style.display = '';
  }
  updateStats();
  persist();
  scheduleSync();
}

function countRange(from, to) {
  let m = 0;
  for (let n = from; n <= to; n++) if (state[n]) m++;
  return { missing: m, total: to - from + 1 };
}

function updateStats() {
  let totalMissing = 0;
  for (let n = 1; n <= 980; n++) if (state[n]) totalMissing++;
  const have = 980 - totalMissing;
  document.getElementById('globalStats').innerHTML =
    `<strong>Tenho: ${have}</strong><br>Faltam: ${totalMissing} / 980`;
  const ps = document.getElementById('printStats');
  if (ps) ps.textContent = `Tenho: ${have}  |  Faltam: ${totalMissing} / 980`;

  // FWC
  let fwcM = 0;
  for (let n = 1;   n <= 9;   n++) if (state[n]) fwcM++;
  for (let n = 970; n <= 980; n++) if (state[n]) fwcM++;
  const gsF = document.getElementById('gs_FWC');
  if (gsF) gsF.textContent = fwcM ? `Faltam ${fwcM}/20` : '✓ Completo';

  // Groups
  for (const g of GROUPS) {
    const groupTeams = TEAMS.filter(t => t.group === g);
    let gMissing = 0;
    for (const team of groupTeams) {
      const { missing } = countRange(team.start, team.start + 19);
      gMissing += missing;
      const tm = document.getElementById('tm_' + team.code);
      if (tm) {
        tm.textContent = missing ? `Faltam ${missing}/20` : '✓ Completo';
        tm.style.color  = missing ? '#c00' : '#2a6e2a';
      }
    }
    const gs = document.getElementById('gs_' + g);
    if (gs) gs.textContent = gMissing ? `Faltam ${gMissing}/80` : '✓ Completo';
  }
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════

function printMissing() {
  // Tag team blocks and group blocks for print-hide
  for (const team of TEAMS) {
    const { missing } = countRange(team.start, team.start + 19);
    const tb = document.getElementById('tb_' + team.code);
    if (tb) tb.classList.toggle('print-hide', missing === 0);
  }
  // FWC
  let fwcM = 0;
  for (let n = 1; n <= 9; n++) if (state[n]) fwcM++;
  for (let n = 970; n <= 980; n++) if (state[n]) fwcM++;
  const fwcBlock = document.getElementById('gb_FWC');
  if (fwcBlock) fwcBlock.classList.toggle('print-hide', fwcM === 0);
  // Groups
  for (const g of GROUPS) {
    const groupTeams = TEAMS.filter(t => t.group === g);
    const gMissing = groupTeams.reduce((s, t) => s + countRange(t.start, t.start + 19).missing, 0);
    const gb = document.getElementById('gb_' + g);
    if (gb) gb.classList.toggle('print-hide', gMissing === 0);
  }
  window.print();
}

function importList() {
  const input = prompt(
    'Cole a lista de NÚMEROS FALTANTES (separados por vírgulas ou espaços):\n' +
    'Ex: 2, 3, 5, 11, 45...'
  );
  if (input == null) return;
  const nums = input.split(/[\s,;]+/).map(v => parseInt(v)).filter(n => n >= 1 && n <= 980 && !isNaN(n));
  if (!nums.length) { alert('Nenhum número válido encontrado.'); return; }
  for (let n = 1; n <= 980; n++) state[n] = false;
  nums.forEach(n => { state[n] = true; });
  refreshAll();
  persist();
  scheduleSync();
  toast(`${nums.length} figurinhas marcadas como faltantes.`);
}

function exportList() {
  const missing = [];
  for (let n = 1; n <= 980; n++) if (state[n]) missing.push(n);
  const txt = missing.join(', ');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => toast('Lista copiada para a área de transferência!'));
  } else {
    prompt('Copie a lista abaixo (Ctrl+A, Ctrl+C):', txt);
  }
}

function resetAllMissing() {
  if (!confirm('Marcar TODAS as 980 figurinhas como faltantes?')) return;
  for (let n = 1; n <= 980; n++) state[n] = true;
  refreshAll();
  persist();
  scheduleSync();
  toast('Álbum zerado — todas as figurinhas marcadas como faltantes.');
}

// ── Filtro ──
let showMissing = true;
let showHave    = true;

function toggleFilter(type) {
  if (type === 'missing') showMissing = !showMissing;
  else                    showHave    = !showHave;
  document.getElementById('btnMissing').classList.toggle('active', showMissing);
  document.getElementById('btnHave').classList.toggle('active', showHave);
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.chip.missing').forEach(el => {
    el.style.display = showMissing ? '' : 'none';
  });
  document.querySelectorAll('.chip.have').forEach(el => {
    el.style.display = showHave ? '' : 'none';
  });
}

function refreshAll() {
  for (let n = 1; n <= 980; n++) {
    const el = document.getElementById('c' + n);
    if (el) el.className = 'chip ' + (state[n] ? 'missing' : 'have');
  }
  updateStats();
  applyFilter();
}

function toast(msg) {
  const t = Object.assign(document.createElement('div'), {
    textContent: msg,
    style: 'position:fixed;bottom:22px;right:22px;background:#222;color:#fff;padding:10px 18px;border-radius:7px;z-index:9999;font-size:13px;box-shadow:0 3px 10px rgba(0,0,0,.3)'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

const ADMIN_EMAIL = 'douek.renato@gmail.com';

const FIREBASE_CONFIG = {
  // ⚠️  Cole aqui o firebaseConfig do seu projeto Firebase
  apiKey:            "COLE_AQUI",
  authDomain:        "COLE_AQUI",
  projectId:         "COLE_AQUI",
  storageBucket:     "COLE_AQUI",
  messagingSenderId: "COLE_AQUI",
  appId:             "COLE_AQUI"
};

let db = null, auth = null, currentUser = null;
let syncTimer = null;

function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db   = firebase.firestore();
    auth.onAuthStateChanged(onAuthChanged);
  } catch(e) {
    console.warn('Firebase não inicializado:', e.message);
  }
}

async function onAuthChanged(user) {
  currentUser = user;
  if (user) {
    setSyncBadge('syncing', 'sincronizando…');
    await registerUser(user);
    await loadFromFirestore(user.uid);
    refreshAll();
    setSyncBadge('ok', '☁️ sincronizado');
    document.getElementById('btnLogin').style.display  = 'none';
    document.getElementById('btnLogout').style.display = '';
    document.getElementById('btnAdmin').style.display  = user.email === ADMIN_EMAIL ? '' : 'none';
    const chip = document.getElementById('userChip');
    chip.style.display = '';
    chip.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" referrerpolicy="no-referrer"> ${user.displayName || user.email}`
      : `👤 ${user.email}`;
    closeModal();
  } else {
    setSyncBadge('offline', 'local');
    document.getElementById('btnLogin').style.display  = '';
    document.getElementById('btnLogout').style.display = 'none';
    document.getElementById('btnAdmin').style.display  = 'none';
    document.getElementById('userChip').style.display  = 'none';
  }
}

async function registerUser(user) {
  try {
    const ref = db.collection('users').doc(user.uid);
    const doc = await ref.get();
    if (!doc.exists) {
      await ref.set({
        email:       user.email,
        displayName: user.displayName || '',
        photoURL:    user.photoURL    || '',
        createdAt:   firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await ref.update({ lastLoginAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
  } catch(e) { console.warn('Erro ao registrar usuário:', e); }
}

async function showAdminPanel() {
  document.getElementById('adminModal').classList.add('open');
  const listEl = document.getElementById('adminList');
  listEl.innerHTML = '<p style="color:#888;padding:8px">Carregando…</p>';
  try {
    const snap = await db.collection('users').orderBy('createdAt', 'desc').get();
    if (snap.empty) { listEl.innerHTML = '<p style="color:#888;padding:8px">Nenhum usuário ainda.</p>'; return; }
    const fmt = dt => dt ? new Date(dt.seconds * 1000).toLocaleString('pt-BR') : '—';
    let rows = '';
    snap.forEach(doc => {
      const u = doc.data();
      const avatar = u.photoURL
        ? `<img src="${u.photoURL}" class="admin-avatar" referrerpolicy="no-referrer">`
        : `<span class="admin-nophoto">👤</span>`;
      rows += `<tr>
        <td>${avatar}${u.displayName || u.email}</td>
        <td style="color:#555">${u.email}</td>
        <td style="color:#888;white-space:nowrap">${fmt(u.createdAt)}</td>
        <td style="color:#aaa;white-space:nowrap">${fmt(u.lastLoginAt)}</td>
      </tr>`;
    });
    listEl.innerHTML = `<table class="admin-table">
      <thead><tr><th>Usuário</th><th>E-mail</th><th>Cadastro</th><th>Último acesso</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } catch(e) {
    listEl.innerHTML = `<p style="color:#c62828;padding:8px">Erro: ${e.message}</p>`;
  }
}

function closeAdminModal() { document.getElementById('adminModal').classList.remove('open'); }

async function loadFromFirestore(uid) {
  try {
    const doc = await db.collection('albums').doc(uid).get();
    if (doc.exists) {
      const have = doc.data().have || [];
      for (let n = 1; n <= 980; n++) state[n] = true;
      have.forEach(n => { state[n] = false; });
      persist(); // atualiza localStorage local
    }
  } catch(e) {
    console.warn('Erro ao carregar do Firestore:', e);
  }
}

function scheduleSync() {
  if (!currentUser || !db) return;
  setSyncBadge('syncing', 'salvando…');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToFirestore, 1500);
}

async function syncToFirestore() {
  if (!currentUser || !db) return;
  try {
    const have = [];
    for (let n = 1; n <= 980; n++) if (!state[n]) have.push(n);
    await db.collection('albums').doc(currentUser.uid).set({
      have,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setSyncBadge('ok', '☁️ sincronizado');
  } catch(e) {
    setSyncBadge('offline', 'erro ao salvar');
    console.warn('Erro ao salvar no Firestore:', e);
  }
}

function setSyncBadge(type, text) {
  const el = document.getElementById('syncBadge');
  el.className = 'sync-badge' + (type !== 'ok' ? ' ' + type : '');
  el.textContent = text;
}

// ── Modal de login ──
function showLoginModal() { document.getElementById('loginModal').classList.add('open'); }
function closeModal()      { document.getElementById('loginModal').classList.remove('open'); document.getElementById('authError').textContent = ''; }

let currentTab = 'entrar';
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabEntrar').classList.toggle('active', tab === 'entrar');
  document.getElementById('tabCriar').classList.toggle('active', tab === 'criar');
  document.getElementById('btnEmailAction').textContent = tab === 'entrar' ? 'Entrar' : 'Criar conta';
  document.getElementById('authError').textContent = '';
}

async function loginGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch(e) {
    document.getElementById('authError').textContent = e.message;
  }
}

async function emailAction() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; return; }
  try {
    if (currentTab === 'entrar') {
      await auth.signInWithEmailAndPassword(email, pass);
    } else {
      await auth.createUserWithEmailAndPassword(email, pass);
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found':    'E-mail não encontrado.',
      'auth/wrong-password':    'Senha incorreta.',
      'auth/email-already-in-use': 'E-mail já cadastrado.',
      'auth/weak-password':     'Senha fraca (mínimo 6 caracteres).',
      'auth/invalid-email':     'E-mail inválido.'
    };
    errEl.textContent = msgs[e.code] || e.message;
  }
}

async function doSignOut() {
  if (!confirm('Sair da conta? O estado fica salvo localmente.')) return;
  await auth.signOut();
}

// ═══════════════════════════════════════════════
// NAVEGAÇÃO — select + flash
// ═══════════════════════════════════════════════

function buildNav() {
  const sel = document.getElementById('teamJump');
  const sorted = [...TEAMS].sort((a, b) => a.name.localeCompare(b.name));

  // opção especial FWC no topo
  const fwcOpt = document.createElement('option');
  fwcOpt.value = 'FWC';
  fwcOpt.textContent = '⭐ Especiais FWC';
  sel.appendChild(fwcOpt);

  sorted.forEach(team => {
    const opt = document.createElement('option');
    opt.value = team.code;
    opt.textContent = `${team.name}  (${team.code} · Grupo ${team.group})`;
    sel.appendChild(opt);
  });
}

function jumpToTeam(code) {
  if (!code) return;
  const el = code === 'FWC'
    ? document.getElementById('gb_FWC')
    : document.getElementById('tb_' + code);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // reinicia animação mesmo que já esteja ativa
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 2100);
  // reseta o select para permitir selecionar o mesmo time novamente
  document.getElementById('teamJump').value = '';
}
